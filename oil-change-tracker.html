<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OilTrack — Mileage Logger</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #e8a020;
    --accent2: #f0c060;
    --text: #f0ede8;
    --muted: #888;
    --danger: #e05050;
    --green: #50c878;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,160,32,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,160,32,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  .logo-title span { color: var(--accent); }

  .oil-icon {
    width: 48px;
    height: 48px;
    opacity: 0.9;
  }

  /* Status card */
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .status-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 12px 12px 0 0;
    transition: background 0.3s;
  }

  .status-card.urgent::before { background: var(--danger); }
  .status-card.urgent { border-color: rgba(224,80,80,0.3); }
  .status-card.good::before { background: var(--green); }

  .status-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .status-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .miles-remaining {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--accent);
    transition: color 0.3s;
  }

  .status-card.urgent .miles-remaining { color: var(--danger); }
  .status-card.good .miles-remaining { color: var(--green); }

  .miles-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-meta {
    text-align: right;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 100px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(232,160,32,0.15);
    color: var(--accent);
    transition: all 0.3s;
  }

  .status-card.urgent .status-badge {
    background: rgba(224,80,80,0.15);
    color: var(--danger);
  }

  .status-card.good .status-badge {
    background: rgba(80,200,120,0.15);
    color: var(--green);
  }

  /* Progress bar */
  .progress-wrap {
    margin-top: 20px;
  }

  .progress-track {
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 6px;
    transition: width 0.6s ease, background 0.3s;
  }

  .status-card.urgent .progress-fill { background: var(--danger); }
  .status-card.good .progress-fill { background: var(--green); }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  /* No data state */
  .no-data {
    text-align: center;
    padding: 12px 0;
    color: var(--muted);
    font-size: 14px;
  }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }

  .field select option { background: var(--surface2); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0e0e0e;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }

  /* History */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .history-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .event-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-change { background: var(--accent); }
  .dot-update { background: #5a9cf8; }

  .event-info {}

  .event-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .event-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .history-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .event-miles {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }

  .btn-delete {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 14px;
    line-height: 1;
    transition: all 0.2s;
  }

  .btn-delete:hover {
    color: var(--danger);
    border-color: rgba(224,80,80,0.3);
    background: rgba(224,80,80,0.08);
  }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 10px;
    opacity: 0.4;
  }

  .empty-text {
    font-size: 14px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--accent);
    z-index: 100;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 400px) {
    .input-row { grid-template-columns: 1fr; }
    .miles-remaining { font-size: 56px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-eyebrow">Vehicle Maintenance</div>
      <div class="logo-title">OIL<span>TRACK</span></div>
    </div>
    <svg class="oil-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 6C24 6 12 18 12 28C12 34.627 17.373 40 24 40C30.627 40 36 34.627 36 28C36 18 24 6 24 6Z" fill="#e8a020" opacity="0.2"/>
      <path d="M24 6C24 6 12 18 12 28C12 34.627 17.373 40 24 40C30.627 40 36 34.627 36 28C36 18 24 6 24 6Z" stroke="#e8a020" stroke-width="2" stroke-linejoin="round"/>
      <path d="M18 30C18 30 19 34 24 34" stroke="#e8a020" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </header>

  <!-- Status Card -->
  <div class="status-card" id="statusCard">
    <div class="status-label">Next Oil Change</div>
    <div id="noDataMsg" class="no-data">Log your first oil change to begin tracking.</div>
    <div id="statusContent" style="display:none">
      <div class="status-row">
        <div>
          <div class="miles-remaining" id="milesRemaining">—</div>
          <div class="miles-label">miles remaining</div>
        </div>
        <div class="status-meta">
          <div class="status-badge" id="statusBadge">On Track</div>
          <div style="font-size:12px; color:var(--muted); margin-top:8px;" id="statusDetail"></div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-labels">
          <span id="progressLeft">0 mi used</span>
          <span id="progressRight">0 mi interval</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Log Entry -->
  <div class="input-card">
    <div class="section-header" style="margin-bottom:16px">
      <div class="section-title">Log Entry</div>
    </div>
    <div class="input-row">
      <div class="field">
        <label>Type</label>
        <select id="entryType" onchange="toggleFields()">
          <option value="change">Oil Change</option>
          <option value="update">Mileage Update</option>
        </select>
      </div>
      <div class="field">
        <label>Current Mileage</label>
        <input type="number" id="mileageInput" placeholder="e.g. 45000" min="0">
      </div>
    </div>
    <div class="input-row" id="changeFields">
      <div class="field">
        <label>Oil Type</label>
        <select id="oilType">
          <option value="Conventional">Conventional</option>
          <option value="Synthetic Blend">Synthetic Blend</option>
          <option value="Full Synthetic" selected>Full Synthetic</option>
          <option value="High Mileage">High Mileage</option>
        </select>
      </div>
      <div class="field">
        <label>Interval (miles)</label>
        <input type="number" id="intervalInput" placeholder="5000" value="5000" min="1000">
      </div>
    </div>
    <button class="btn-primary" onclick="logEntry()">+ Log Entry</button>
  </div>

  <!-- History -->
  <div>
    <div class="section-header">
      <div class="section-title">History</div>
      <div id="entryCount" style="font-size:12px; color:var(--muted)"></div>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">
        <div class="empty-icon">🔧</div>
        <div class="empty-text">No entries yet. Log your first oil change above.</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'oiltrack_v1';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function toggleFields() {
    const type = document.getElementById('entryType').value;
    document.getElementById('changeFields').style.display = type === 'change' ? 'grid' : 'none';
  }

  function logEntry() {
    const type = document.getElementById('entryType').value;
    const mileageVal = document.getElementById('mileageInput').value.trim();

    if (!mileageVal || isNaN(mileageVal) || Number(mileageVal) < 0) {
      showToast('Enter a valid mileage reading.');
      return;
    }

    const mileage = Math.round(Number(mileageVal));
    const data = load();

    const entry = {
      id: Date.now(),
      type,
      mileage,
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
      timestamp: Date.now()
    };

    if (type === 'change') {
      const interval = Number(document.getElementById('intervalInput').value) || 5000;
      entry.interval = interval;
      entry.oilType = document.getElementById('oilType').value;
    }

    data.unshift(entry);
    save(data);
    renderAll();
    document.getElementById('mileageInput').value = '';
    showToast(type === 'change' ? '✓ Oil change logged!' : '✓ Mileage updated!');
  }

  function deleteEntry(id) {
    const data = load().filter(e => e.id !== id);
    save(data);
    renderAll();
    showToast('Entry removed.');
  }

  function renderAll() {
    const data = load();
    renderStatus(data);
    renderHistory(data);
  }

  function renderStatus(data) {
    const card = document.getElementById('statusCard');
    const noData = document.getElementById('noDataMsg');
    const content = document.getElementById('statusContent');

    // Find last oil change
    const lastChange = data.find(e => e.type === 'change');
    if (!lastChange) {
      noData.style.display = 'block';
      content.style.display = 'none';
      card.className = 'status-card';
      return;
    }

    noData.style.display = 'none';
    content.style.display = 'block';

    // Find current mileage (most recent entry)
    const currentMileage = data.length > 0 ? data[0].mileage : lastChange.mileage;
    const interval = lastChange.interval || 5000;
    const nextChange = lastChange.mileage + interval;
    const used = currentMileage - lastChange.mileage;
    const remaining = Math.max(nextChange - currentMileage, 0);
    const pct = Math.min((used / interval) * 100, 100);

    document.getElementById('milesRemaining').textContent = remaining.toLocaleString();
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLeft').textContent = used.toLocaleString() + ' mi used';
    document.getElementById('progressRight').textContent = interval.toLocaleString() + ' mi interval';
    document.getElementById('statusDetail').textContent = 'Due at ' + nextChange.toLocaleString() + ' mi';

    const badge = document.getElementById('statusBadge');
    card.classList.remove('urgent', 'good');

    if (remaining === 0) {
      card.classList.add('urgent');
      badge.textContent = 'Overdue';
    } else if (remaining <= 500) {
      card.classList.add('urgent');
      badge.textContent = 'Due Soon';
    } else if (pct < 50) {
      card.classList.add('good');
      badge.textContent = 'Good';
    } else {
      badge.textContent = 'On Track';
    }
  }

  function renderHistory(data) {
    const list = document.getElementById('historyList');
    const count = document.getElementById('entryCount');

    count.textContent = data.length + (data.length === 1 ? ' entry' : ' entries');

    if (data.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔧</div>
        <div class="empty-text">No entries yet. Log your first oil change above.</div>
      </div>`;
      return;
    }

    list.innerHTML = data.map(e => `
      <div class="history-item">
        <div class="history-left">
          <div class="event-dot ${e.type === 'change' ? 'dot-change' : 'dot-update'}"></div>
          <div class="event-info">
            <div class="event-title">${e.type === 'change' ? '🛢 Oil Change' : '📍 Mileage Update'}</div>
            <div class="event-subtitle">${e.date}${e.type === 'change' ? ' · ' + e.oilType + ' · every ' + (e.interval||5000).toLocaleString() + ' mi' : ''}</div>
          </div>
        </div>
        <div class="history-right">
          <div class="event-miles">${e.mileage.toLocaleString()} mi</div>
          <button class="btn-delete" onclick="deleteEntry(${e.id})" title="Delete">✕</button>
        </div>
      </div>
    `).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  // Init
  toggleFields();
  renderAll();
</script>
</body>
</html>
